name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Add MinGW to PATH
        run: echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH

      - name: Build
        run: scripts\build-binaries.bat whylag_res.o whylag.exe whylag-gui.exe

      - name: Test
        run: tests\run_tests.bat

      - name: Package release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item whylag.exe, whylag-gui.exe, LICENSE -Destination release
          $lines = @()
          foreach ($f in @('whylag.exe', 'whylag-gui.exe')) {
            $hash = (Get-FileHash "release\$f" -Algorithm SHA256).Hash.ToLower()
            $lines += "$hash  $f"
          }
          $lines | Set-Content -Path release\SHA256SUMS.txt -Encoding ascii
          Copy-Item release\SHA256SUMS.txt SHA256SUMS.txt
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path release\* -DestinationPath "whylag-$tag-windows.zip" -Force

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            whylag.exe
            whylag-gui.exe
            LICENSE
            SHA256SUMS.txt
            whylag-${{ github.ref_name }}-windows.zip
          body: |
            Windows binaries for whylag ${{ github.ref_name }}.

            **Run as Administrator** (ETW kernel tracing requires elevation). The GUI prompts UAC on launch; run the CLI elevated when sampling.

            | File | Purpose |
            |------|---------|
            | `whylag-gui.exe` | GUI with live tables, CSV export/compare, Help (UAC on launch) |
            | `whylag.exe` | CLI for scripts and terminal use |
            | `SHA256SUMS.txt` | Verify downloads (see [SECURITY.md](SECURITY.md)) |
            | `whylag-${{ github.ref_name }}-windows.zip` | All of the above bundled |

            Binaries are unsigned. SmartScreen may warn on first download; verify SHA256 or build from source (see README).

          generate_release_notes: true
